name: AgentEvalsViewer CI

on:
  push:
    branches: [main, Dev]
    paths:
      - 'AgentEvalsViewer/**'
      - '.github/workflows/agentevalsviewer-ci.yml'
  pull_request:
    branches: [main, Dev]
    paths:
      - 'AgentEvalsViewer/**'
      - '.github/workflows/agentevalsviewer-ci.yml'

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: AgentEvalsViewer

jobs:
  build:
    name: Lint, type-check, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: AgentEvalsViewer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

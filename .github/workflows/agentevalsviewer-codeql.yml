name: AgentEvalsViewer CodeQL

on:
  push:
    branches: [main]
    paths:
      - 'AgentEvalsViewer/**'
      - '.github/workflows/agentevalsviewer-codeql.yml'
  pull_request:
    branches: [main]
    paths:
      - 'AgentEvalsViewer/**'
      - '.github/workflows/agentevalsviewer-codeql.yml'
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC

defaults:
  run:
    working-directory: AgentEvalsViewer

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          source-root: AgentEvalsViewer

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AgentEvalsViewer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

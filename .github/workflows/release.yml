name: Release Managed Solution

on:
  workflow_dispatch:
    inputs:
      solution_name:
        description: 'Solution name in Dataverse'
        required: true
        default: 'MCSHelperCodeApps'
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect solution version from Solution.xml
        id: solutionversion
        shell: bash
        run: |
          # Reads <Version>1.2.3.4</Version> from the shared solution manifest.
          # This is the source of truth — it's bumped in the maker portal and
          # pulled into git via `node scripts/pull-solution.mjs`.
          VERSION=$(sed -n 's|.*<Version>\([^<]*\)</Version>.*|\1|p' solution/src/Other/Solution.xml | head -n1)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract <Version> from solution/src/Other/Solution.xml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected solution version: $VERSION"

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Authenticate pac CLI
        shell: pwsh
        run: |
          $pac = $env:POWERPLATFORMTOOLS_PACPATH
          & $pac auth create --applicationId ${{ secrets.PAC_APP_ID }} --clientSecret ${{ secrets.PAC_CLIENT_SECRET }} --tenant ${{ secrets.PAC_TENANT_ID }} --environment ${{ secrets.PAC_ENVIRONMENT_ID }}

      - name: Export managed solution
        shell: pwsh
        run: |
          $pac = $env:POWERPLATFORMTOOLS_PACPATH
          & $pac solution export --name ${{ inputs.solution_name }} --path "${{ github.workspace }}\${{ inputs.solution_name }}_v${{ steps.solutionversion.outputs.version }}_managed.zip" --managed --environment ${{ secrets.PAC_ENVIRONMENT_ID }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.solutionversion.outputs.version }}
          name: MCS Helper Code Apps v${{ steps.solutionversion.outputs.version }}
          body: |
            ## MCS Helper Code Apps v${{ steps.solutionversion.outputs.version }}

            Shared Power Platform solution containing all Code Apps in this monorepo:

            - **MCS Transcript Viewer** — conversation transcript debugger
            - **Agent Evaluations Viewer** — eval-runs trend dashboard

            ### Installation
            1. Download the managed solution `.zip` below
            2. Import it into your Power Platform environment via [make.powerapps.com](https://make.powerapps.com) → Solutions → Import
            3. Wire the connection references and turn on the bundled flows

            ### Prerequisites
            - Power Platform environment with **Code Apps enabled** in environment settings
            - Copilot Studio agents deployed in the environment
          files: |
            ${{ github.workspace }}/${{ inputs.solution_name }}_v${{ steps.solutionversion.outputs.version }}_managed.zip
          draft: false
          prerelease: false
